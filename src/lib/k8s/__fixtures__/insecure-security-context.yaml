apiVersion: apps/v1
kind: Deployment
metadata:
  name: build-runner
  namespace: platform
  labels:
    app.kubernetes.io/name: build-runner
    app.kubernetes.io/instance: platform-prod
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: ci-platform
    app.kubernetes.io/managed-by: authos
    team: platform
  annotations:
    owner: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: build-runner
      app.kubernetes.io/instance: platform-prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: build-runner
        app.kubernetes.io/instance: platform-prod
    spec:
      hostNetwork: true
      containers:
        - name: runner
          image: ghcr.io/example/build-runner:5.4.2
          ports:
            - name: metrics
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
          livenessProbe:
            httpGet:
              path: /livez
              port: metrics
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1Gi"
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0
            capabilities:
              add:
                - SYS_ADMIN
                - NET_ADMIN
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
