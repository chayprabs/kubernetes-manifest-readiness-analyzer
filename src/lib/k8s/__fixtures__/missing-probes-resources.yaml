apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: production
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/instance: checkout-prod
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: storefront
    app.kubernetes.io/managed-by: authos
    team: storefront
  annotations:
    owner: storefront
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout-api
      app.kubernetes.io/instance: checkout-prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-api
        app.kubernetes.io/instance: checkout-prod
    spec:
      containers:
        - name: api
          image: ghcr.io/example/checkout-api:latest
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-api
  namespace: production
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/instance: checkout-prod
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: storefront
    app.kubernetes.io/managed-by: authos
    team: storefront
  annotations:
    owner: storefront
spec:
  selector:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/instance: checkout-prod
  ports:
    - name: http
      port: 80
      targetPort: http
