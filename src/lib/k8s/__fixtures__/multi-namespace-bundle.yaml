apiVersion: v1
kind: Namespace
metadata:
  name: edge
---
apiVersion: v1
kind: Namespace
metadata:
  name: jobs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-api
  namespace: edge
  labels:
    app.kubernetes.io/name: edge-api
    app.kubernetes.io/instance: edge-prod
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: edge
    app.kubernetes.io/managed-by: authos
    team: edge
  annotations:
    owner: edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: edge-api
      app.kubernetes.io/instance: edge-prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edge-api
        app.kubernetes.io/instance: edge-prod
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/example/edge-api:1.12.0
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /livez
              port: http
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "750m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: edge-api
  namespace: edge
spec:
  selector:
    app.kubernetes.io/name: edge-api
    app.kubernetes.io/instance: edge-prod
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: edge-default-deny
  namespace: edge
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: jobs-nightly-sync
  namespace: jobs
  labels:
    app.kubernetes.io/name: jobs-nightly-sync
    app.kubernetes.io/component: batch
    app.kubernetes.io/part-of: backoffice
    app.kubernetes.io/managed-by: authos
    team: ops
  annotations:
    owner: ops
spec:
  schedule: "30 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sync
              image: ghcr.io/example/jobs-sync:2.0.0
              args:
                - /bin/sh
                - -c
                - sync-jobs.sh
