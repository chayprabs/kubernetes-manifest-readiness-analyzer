apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: production
  labels:
    app.kubernetes.io/name: catalog-api
    app.kubernetes.io/instance: catalog-prod
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: catalog
    app.kubernetes.io/managed-by: authos
    team: catalog
  annotations:
    owner: catalog
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-api
      app.kubernetes.io/instance: catalog-prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-api
        app.kubernetes.io/instance: catalog-prod
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/example/catalog-api:2.1.0
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /livez
              port: http
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "750m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: catalog-api-pdb
  namespace: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: search-api
      app.kubernetes.io/instance: search-prod
