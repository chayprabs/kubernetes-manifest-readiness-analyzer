apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront-web
  namespace: edge
  labels:
    app.kubernetes.io/name: storefront-web
    app.kubernetes.io/instance: storefront-prod
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: storefront
    app.kubernetes.io/managed-by: authos
    team: edge
  annotations:
    owner: edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: storefront-web
      app.kubernetes.io/instance: storefront-prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: storefront-web
        app.kubernetes.io/instance: storefront-prod
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/example/storefront-web:3.8.0
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /livez
              port: http
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "750m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: storefront-web
  namespace: edge
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: storefront-web
    app.kubernetes.io/instance: storefront-prod
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: storefront-web
  namespace: edge
spec:
  rules:
    - host: storefront.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront-web
                port:
                  number: 80
