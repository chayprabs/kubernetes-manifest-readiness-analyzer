apiVersion: v1
kind: Secret
metadata:
  name: payments-secrets
  namespace: production
  annotations:
    example.com/database-password: fake-inline-secret
type: Opaque
data:
  password: ZG9udC1wcmludC1tZQ==
stringData:
  api-token: fake-string-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: production
  labels:
    app.kubernetes.io/name: payments-api
    app.kubernetes.io/instance: payments-prod
  annotations:
    example.com/private-key: fake-private-key-material
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payments-api
      app.kubernetes.io/instance: payments-prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments-api
        app.kubernetes.io/instance: payments-prod
    spec:
      containers:
        - name: api
          image: ghcr.io/example/payments-api:1.0.0
          env:
            - name: DATABASE_PASSWORD
              value: super-secret-password-123
            - name: INTERNAL_API_ENDPOINT
              value: payments-db.production.svc.cluster.local
